<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYvC Test Page</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        h1 { color: #1a73e8; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 80%; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:active { background-color: #1557b0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>KYvC 임시 웹사이트</h1>
        <p>이 화면은 앱 내부의 <b>assets</b> 폴더에서 로드되었습니다.</p>
        <p id="status">네이티브 대기 중...</p>
        <button onclick="callNative()">안드로이드 기능 호출</button>
    </div>

    <script>
        function callNative() {
            // 나중에 안드로이드에서 설정할 브릿지 이름: AndroidBridge
            if (window.AndroidBridge) {
                window.AndroidBridge.showToast("웹에서 보낸 메시지입니다!");
            } else {
                alert("안드로이드 브릿지가 연결되지 않았습니다.");
            }
        }

        // 안드로이드에서 이 함수를 호출할 수 있습니다.
        function setStatus(message) {
            document.getElementById('status').innerText = message;
        }
    </script>
</body>
</html>
